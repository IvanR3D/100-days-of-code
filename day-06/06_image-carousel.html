<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Carousel - 100 days of code</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #111;
            color: #EEE;
        }

        article {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #showcase {
            width: 90%;
            height: 70%;
            background-position: center;
            background-size: contain;
            background-repeat: no-repeat;
            margin: 10px 0;
        }

        #showcase #left,
        #showcase #right {
            position: relative;
            top: 50%;
        }

        #showcase #right {
            left: 95%;
        }

        #left:hover,
        #right:hover {
            cursor: pointer;
            opacity: 0.8;
        }

        #img-list {
            width: 90%;
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
        }

        #img-list img {
            width: 19%;
        }

        #img-list .active {
            border: 1px solid #E5E5E5;
        }
    </style>
</head>
<body>
    <article>
        <div id="showcase">
            <span id="left"> ← </span>
            <span id="right"> → </span>
        </div>
        <div id="img-list">
            <img
                src="https://d36tnp772eyphs.cloudfront.net/blogs/1/2015/04/Mount-Taranaki-volcano-in-New-Zealand.jpg" />
            <img
                src="https://media-gadventures.global.ssl.fastly.net/media-server/dynamic/blogs/posts/daniels/2015/04/9-iceland_northern_lights_landscape_arctic_adventures_elli_thor_magnusson.jpg" />
            <img src="https://berrizdesign.com/wp-content/uploads/2024/05/beautiful-landscape.jpg" />
            <img src="https://www.wanderlustchloe.com/wp-content/uploads/2022/07/landscapes-in-Italy.jpg" />
            <img src="https://i.natgeofe.com/n/737e4cbf-3d9e-4f89-b4b2-29b5cf303dba/01-best_pod_landscapes.jpg" />
        </div>
    </article>
    <script>
        const show = document.getElementById("showcase");
        const imgList = document.getElementById("img-list").children;
        const left = document.getElementById("left");
        const right = document.getElementById("right");
        const limit = 5;
        let idx = 0;
        imgList[idx].classList.add("active");
        show.style.backgroundImage = "url('" + imgList[idx].src + "')";
        left.addEventListener("click", () => {
            imgList[idx].classList.remove("active");
            idx = idx === 0 ? limit - 1 : idx - 1;
            imgList[idx].classList.add("active"); show.style.backgroundImage = "url('" + imgList[idx].src + "')";
        });
        right.addEventListener("click", () => {
            imgList[idx].classList.remove("active");
            idx = (idx + 1) % limit; imgList[idx].classList.add("active");
            show.style.backgroundImage = "url('" + imgList[idx].src + "')"
        });
    </script>
</body>
</html>
