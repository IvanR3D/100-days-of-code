<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - 100 days of code</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            width: 100vw;
            height: 100vh;
            font-family: system-ui;
            background-image: url("./bg.png");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
        }

        article {
            position: absolute;
            top: 25%;
            left: 5%;
            width: 40%;
        }

        article>span {
            color: #707070;
            font-size: 12px;
            font-weight: 600;
        }

        article p {
            font-size: 12px;
            font-weight: 600;
            color: #707070;
            padding: 10px 0;
        }

        h1 {
            font-size: 32px;
            padding: 10px 0 20px 0;
        }

        .form-group {
            width: 100%;
            display: flex;
            gap: 10px;
            padding: 5px;
        }

        input {
            border: none;
            border-radius: 8px;
            background-color: #CDF5;
            padding: 10px;
        }

        input::placeholder {
            color: #c0c0c0;
        }

        input[type="text"] {
            width: 50%;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
        }

        input[type="submit"] {
            width: 100%;
            color: #EEE;
            background-color: #47F;
            border-radius: 20px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <article>
        <span>START FOR FREE</span>
        <h1>Create a new account</h1>
        <form>
            <div class="form-group">
                <input type="text" placeholder="First name" />
                <input type="text" placeholder="Last name" />
            </div>
            <div class="form-group">
                <input type="email" placeholder="Email" />
            </div>
            <div class="form-group">
                <input type="password" placeholder="Password" />
            </div>
            <p>Already have an account? <a href="#">Sign In</a></p>
            <div class="form-group">
                <input type="submit" value="Create account" />
            </div>
        </form>
</body>
</html>
