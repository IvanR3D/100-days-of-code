<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - 100 days of code</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: space-around;
            background-image: linear-gradient(to bottom, #42F 10%, #F05);
            color: white;
            font-family: system-ui;
            font-weight: 300;
            padding-top: 80px;
        }

        .title,
        .form {
            width: 50%;
            padding: 0 40px;
        }

        h2 {
            font-size: 40px;
            font-weight: 400;
            padding-bottom: 15px;
        }

        form {
            width: 90%;
            height: 70%;
            /* temporal */
            display: flex;
            flex-direction: column;
            gap: 15px;
            color: #444;
            background-color: white;
            border-radius: 20px;
            font-size: 12px;
            padding: 20px;
        }

        form h3 {
            font-weight: 400;
            font-size: 14px;
        }

        .pref-contact {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        form input,
        textarea {
            border: 1px solid #c0c0c0;
            border-radius: 15px;
            padding: 8px;
        }

        textarea {
            height: 30%;
        }

        .submit-btn {
            background-color: #F05;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 10px 0;
        }
    </style>
</head>

<body>
    <div class="title">
        <h2>Contact us</h2>
        <p>Get in touch with us! Whether you have questions, feedback, or just want to say hello, we're here for you.
        </p>
    </div>
    <div class="form">
        <form>
            <h3>Send us a message</h3>
            <input type="text" placeholder="Name" />
            <input type="email" placeholder="Email" />
            <input type="tel" placeholder="Phone" />
            <div class="pref-contact">
                <label>Preferred contact method of communication</label>
                <div>
                    <input type="radio" id="email" value="email" name="pref_contact" /> <label for="email">Email</label>
                    <input type="radio" id="phone" value="phone" name="pref_contact" /> <label for="phone">Phone</label>
                </div>
            </div>
            <textarea placeholder="Message"></textarea>
            <button class="submit-btn" type="submit">Submit</button>
    </div>
</body>

</html>
